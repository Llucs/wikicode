name: openhands

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: openhands
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"

jobs:
  openhands:
    name: OpenHands autonomous agent
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@openhands')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'openhands'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs and plugins
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt
          mkdocs --version

      - name: Validate MkDocs configuration
        run: mkdocs build --strict --clean

      - name: Configure git for commits
        run: |
          git config user.name "wikicode-bot"
          git config user.email "wikicode-bot@users.noreply.github.com"

      - name: Verify OpenHands secret is configured
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
        run: |
          if [ -z "$OPENHANDS_API_KEY" ]; then
            echo "::error::Secret OPENHANDS_API_KEY is not configured."
            exit 1
          fi
          echo "OpenHands API key is configured (length: ${#OPENHANDS_API_KEY})."

      - name: Install OpenHands SDK and CLI
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "openhands>=1.0"
          openhands --version || python -c "import openhands; print('openhands', openhands.__version__ if hasattr(openhands,'__version__') else 'installed')"

      - name: Build task prompt
        run: |
          cat > /tmp/task.md <<'TASK_EOF'
          You are the WikiCode autonomous maintainer agent. Your job is to grow
          the wiki by doing one meaningful task per execution.

          Steps:
          1. Read AGENT.md, memory/mission.md, memory/rules.md,
             memory/knowledge.md, memory/decisions.md.
          2. Read tasks/queue.md and pick the FIRST unchecked task.
          3. Run an anti-duplication check: use `git grep` and read the
             relevant section's `index.md` to confirm the topic is not
             already covered.
          4. Execute the task. Make a REAL, useful change to the repository.
             No placeholders, no fake data.
          5. Write a report in `docs/reports/YYYY-MM-DD-<slug>.md` with the
             frontmatter and metadata card the rest of the site uses.
          6. Update `tasks/queue.md` (remove the task) and
             `tasks/completed.md` (add it with a link to the report).
          7. Commit your changes with a clear, scoped message and push to
             the current branch.

          Rules:
          - Do NOT touch LICENSE, README header, or any secret.
          - Do NOT run destructive git operations (force push, history rewrite).
          - Do NOT duplicate content that already exists.
          - Every Markdown file you create or modify must have frontmatter
            (title, description, created, tags, status).
          - After pushing, the site will rebuild automatically through
            .github/workflows/pages.yml.
          TASK_EOF
          echo "Task prompt written to /tmp/task.md"

      - name: Run OpenHands agent
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENHANDS_WORKSPACE: ${{ github.workspace }}
          OPENHANDS_TASK_FILE: /tmp/task.md
        run: |
          set +e
          echo "Invoking openhands CLI..."
          openhands \
            --task "$(cat /tmp/task.md)" \
            --workspace "$OPENHANDS_WORKSPACE" \
            2>&1 | tee /tmp/openhands.log
          OPENHANDS_EXIT=${PIPESTATUS[0]}
          echo "openhands exit code: $OPENHANDS_EXIT"
          if [ "$OPENHANDS_EXIT" -ne 0 ]; then
            echo "::warning::OpenHands CLI exited with code $OPENHANDS_EXIT. Falling back to scripted commit if there are unstaged changes."
          fi

      - name: Fallback commit and push any uncommitted changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes detected:"
            git status --short
            git add -A
            git commit -m "OpenHands: autonomous update ($(date -u +%Y-%m-%dT%H:%M:%SZ))" || true
            git push origin HEAD:main
            echo "Pushed uncommitted changes."
          else
            echo "No uncommitted changes to push."
          fi

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openhands-log
          path: /tmp/openhands.log
          if-no-files-found: ignore
          retention-days: 7
