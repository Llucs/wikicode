name: openhands

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: openhands
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"

jobs:
  openhands:
    name: OpenHands autonomous agent
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@openhands')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'openhands'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs and plugins
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt
          mkdocs --version

      - name: Validate MkDocs configuration
        run: mkdocs build --strict --clean

      - name: Configure git for commits
        run: |
          git config user.name "wikicode-bot"
          git config user.email "wikicode-bot@users.noreply.github.com"

      - name: Verify OpenHands secret is configured
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
        run: |
          if [ -z "$OPENHANDS_API_KEY" ]; then
            echo "::error::Secret OPENHANDS_API_KEY is not configured."
            exit 1
          fi
          echo "OpenHands API key is configured (length: ${#OPENHANDS_API_KEY})."

      - name: Install OpenHands CLI
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet "openhands>=1.16"
          openhands --version

      - name: Build task prompt
        run: |
          cat > /tmp/task.md <<'TASK_EOF'
          You are the WikiCode autonomous maintainer agent running in
          OpenHands Cloud. Your job is to grow the wiki by doing one
          meaningful task per execution.

          The repository is already cloned at the current working directory
          and git is configured with credentials. You have shell access.

          Steps:
          1. Read AGENT.md, memory/mission.md, memory/rules.md,
             memory/knowledge.md, memory/decisions.md.
          2. Read tasks/queue.md and pick the FIRST unchecked task.
          3. Run an anti-duplication check: use `git grep` and read the
             relevant section's `index.md` to confirm the topic is not
             already covered.
          4. Execute the task. Make a REAL, useful change. No placeholders,
             no fake data.
          5. Write a report in `docs/reports/YYYY-MM-DD-<slug>.md` with the
             same frontmatter and metadata card the rest of the site uses.
          6. Update `tasks/queue.md` (remove the task) and
             `tasks/completed.md` (add it with a link to the report).
          7. Commit your changes with a clear, scoped message and push to
             the current branch (`git push origin main`).

          Rules:
          - Do NOT touch LICENSE, README header, or any secret.
          - Do NOT run destructive git operations (force push, history rewrite).
          - Do NOT duplicate content that already exists.
          - Every Markdown file you create or modify must have frontmatter
            (title, description, created, tags, status).
          - Do NOT commit anything under `site/` (it's gitignored build output).
          - After pushing, the site will rebuild automatically through
            .github/workflows/pages.yml.
          TASK_EOF
          echo "Task prompt written to /tmp/task.md"

      - name: Run OpenHands Cloud agent
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          OPENHANDS_TASK_FILE: /tmp/task.md
          WIKICODE_REPO: Llucs/wikicode
          WIKICODE_BRANCH: main
          OPENHANDS_POLL_INTERVAL: "15"
          OPENHANDS_POLL_TIMEOUT: "1500"
        run: |
          set +e
          cd "$GITHUB_WORKSPACE"
          echo "Calling OpenHands Cloud REST API directly..."
          python scripts/openhands_cloud.py 2>&1 | tee /tmp/openhands.log
          OPENHANDS_EXIT=${PIPESTATUS[0]}
          echo "agent exit code: $OPENHANDS_EXIT"
          if [ "$OPENHANDS_EXIT" -ne 0 ]; then
            echo "::error::OpenHands Cloud agent exited with code $OPENHANDS_EXIT."
            exit "$OPENHANDS_EXIT"
          fi

      - name: Verify repository was changed
        run: |
          echo "Last 3 commits on main:"
          git log --oneline -3
          echo
          echo "Files changed in the last commit:"
          git show --stat HEAD~0 2>/dev/null | tail -20 || git diff --name-only HEAD~1 HEAD

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openhands-log
          path: /tmp/openhands.log
          if-no-files-found: ignore
          retention-days: 7
