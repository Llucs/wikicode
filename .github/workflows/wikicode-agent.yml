name: wikicode-agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,18 * * *"
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: wikicode-agent
  cancel-in-progress: true

jobs:
  agent:
    name: Autonomous agent (OpenCode API)
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@agent')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'agent'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "wikicode-bot"
          git config user.email "wikicode-bot@users.noreply.github.com"

      - name: Run autonomous agent
        id: agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/agent.py 2>&1 | tee /tmp/agent.log
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log
          path: /tmp/agent.log
          if-no-files-found: ignore
          retention-days: 7
