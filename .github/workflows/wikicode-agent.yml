name: wikicode-agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: wikicode-agent
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"
  OLLAMA_MODEL: qwen2.5:3b
  OLLAMA_MODEL_SAFE: qwen2.5-3b

jobs:
  agent:
    name: Local AI agent (Ollama + Qwen2.5)
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@agent')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'agent'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama API ready"
              break
            fi
            echo "Waiting for Ollama... $i"
            sleep 2
          done
          echo "OLLAMA_HOST=http://localhost:11434" >> $GITHUB_ENV

      - name: Cache Ollama model
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: ~/.ollama/
          key: ollama-${{ env.OLLAMA_MODEL_SAFE }}-v1

      - name: Pull model
        run: |
          if ! curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
            echo "Ollama not running — starting it"
            ollama serve &
            sleep 5
          fi
          ollama pull ${{ env.OLLAMA_MODEL }} 2>&1
          echo "Model pulled: $(ollama list | grep '${{ env.OLLAMA_MODEL }}' || echo 'NOT FOUND')"

      - name: Validate initial MkDocs build
        run: mkdocs build --strict --clean 2>&1 || true

      - name: Configure git
        run: |
          git config user.name "wikicode-bot"
          git config user.email "wikicode-bot@users.noreply.github.com"

      - name: Run autonomous agent
        id: agent
        env:
          OLLAMA_HOST: http://localhost:11434
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/agent.py 2>&1 | tee /tmp/agent.log
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log
          path: /tmp/agent.log
          if-no-files-found: ignore
          retention-days: 7
