name: wikicode-agent-tools

on:
  workflow_dispatch:
    inputs:
      focus:
        description: 'Focus area'
        required: false
        default: 'tools'
  schedule:
    - cron: "0 6,18 * * *"

permissions:
  contents: write

concurrency:
  group: wikicode-agent
  cancel-in-progress: true

jobs:
  agent:
    name: Discover & document developer tools
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt

      - run: |
          git config user.name "wikicode-bot"
          git config user.email "wikicode-bot@users.noreply.github.com"

      - name: Run autonomous agent (tools focus)
        id: agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FOCUS: tools
        run: |
          python scripts/agent.py 2>&1 | tee /tmp/agent.log
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-log-tools
          path: /tmp/agent.log
          if-no-files-found: ignore
          retention-days: 7
