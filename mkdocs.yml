site_name: WikiCode
site_description: A living developer wiki — articles, projects and snippets maintained over time.
site_author: Llucs
copyright: Copyright &copy; 2026 Llucs

repo_url: https://github.com/Llucs/wikicode
repo_name: Llucs/wikicode
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.path
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - assets/css/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Llucs/wikicode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.smartsymbols
  - meta

plugins:
  - search:
      lang: en
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
      strict: false
  - git-committers:
      enabled: !ENV [ENABLE_COMMITTERS, false]
  - blog:
      blog_dir: blog
      post_dir: blog/posts
      blog_toc: true
      post_url_date_format: yyyy
      post_date_format: yyyy-MM-dd
      post_excerpt: optional
      pagination_per_page: 10
      categories: true

nav:
  - Home: index.md
  - Search: search.md
  - Getting started: getting-started.md
  - Learning paths: learning-paths.md
  - Guides:
      - guides/index.md
  - Reference:
      - Glossary: reference/glossary.md
      - Architecture: reference/architecture.md
      - Changelog: reference/changelog.md
  - Topics:
      - topics/index.md
  - Tools:
      - docs/tools/index.md
  - Tags: tags.md
  - Blog:
      - blog/index.md
  - Projects:
      - projects/index.md
  - Snippets:
      - snippets/index.md
  - Reports:
      - reports/index.md
