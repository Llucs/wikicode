site_name: WikiCode
site_description: A living developer wiki — articles, projects and snippets maintained over time.
site_author: Llucs
site_url: https://llucs.github.io/wikicode/
copyright: Copyright &copy; 2026 Llucs

repo_url: https://github.com/Llucs/wikicode
repo_name: Llucs/wikicode
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.path
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - assets/css/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Llucs/wikicode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.smartsymbols
  - meta

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português
          build: true
        - locale: es
          name: Español
          build: true
        - locale: fr
          name: Français
          build: true
        - locale: de
          name: Deutsch
          build: true
        - locale: ja
          name: 日本語
          build: true
        - locale: zh
          name: 中文
          build: true
  - search:
      lang:
        - en
        - pt
        - es
        - fr
        - de
        - ja
        - zh
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
      strict: false
      enable_git_follow: false
  - git-committers:
      enabled: !ENV [ENABLE_COMMITTERS, false]
  - blog:
      blog_dir: blog
      post_dir: blog/posts
      blog_toc: true
      post_url_date_format: yyyy
      post_date_format: yyyy-MM-dd
      post_excerpt: optional
      pagination_per_page: 10
      archive: false
      categories: false
      authors: false

nav:
  - Home: index.md
  - Search: search.md
  - Getting started: getting-started.md
  - Learning paths: learning-paths.md
  - Guides:
      - guides/index.md
      - REST API Go: guides/rest-api-go.md
      - Navigation audit: improve-navigation.md
  - Reference:
      - Glossary: reference/glossary.md
      - Architecture: reference/architecture.md
      - Changelog: reference/changelog.md
  - Concepts:
      - concepts/index.md
  - Topics:
      - topics/index.md
  - Tools:
      - tools/index.md
  - Analyses:
      - analyses/index.md
  - Tags: tags.md
  - Blog:
      - blog/index.md
  - Projects:
      - projects/index.md
  - Snippets:
      - snippets/index.md
  - Reports:
      - reports/index.md
